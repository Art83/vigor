name: Vigor C build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc cppcheck

      - name: Static Analysis (Linting)
        run: cppcheck --error-exitcode=1 .

      - name: Compile with Makefile
        run: make

      - name: Test Execution
        run: ./vigor
